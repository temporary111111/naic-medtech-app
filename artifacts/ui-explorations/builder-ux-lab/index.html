<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Builder UX Lab | Container Field</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="lab-shell">
    <header class="lab-topbar" aria-label="Builder UX Lab header">
      <div class="brand-mark">N</div>
      <div>
        <p class="eyebrow">Builder UX Lab</p>
        <h1>Container and field builder</h1>
      </div>
      <div class="topbar-actions">
        <button class="primary" type="button">Save prototype</button>
      </div>
    </header>

    <section class="lab-note" aria-label="Prototype goal">
      <strong>Pass 05</strong>
      <span>Test lean builder navigation: Basics, Content, Signatories, and Print. Content has a live input preview; Print has its own output preview.</span>
    </section>

    <div class="builder-frame">
      <aside class="workspace-panel" aria-label="Builder workspace navigation">
        <div class="panel-head">
          <p class="eyebrow">Workspace</p>
          <h2>Blood Bank</h2>
        </div>
        <nav id="workspaceNav" class="workspace-nav" aria-label="Builder areas"></nav>
      </aside>

      <section class="work-canvas" aria-label="Active builder workspace">
        <div id="workspaceEditor"></div>
      </section>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
